<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Page | The Luminary Hotel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Responsive Navigation Layout Styles --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative; /* Crucial for positioning the mobile dropdown */
            padding: 1rem 2rem;
        }

        .menu-toggle {
            display: none; /* Hidden on desktop screens */
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: inherit;
        }

        /* --- Mobile Breakpoint (768px and below) --- */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block; /* Show hamburger button on mobile */
            }

            .nav-links {
                display: none; /* Hide navigation links by default on mobile */
                flex-direction: column;
                position: absolute;
                top: 100%; /* Spans directly below the nav bar */
                left: 0;
                width: 100%;
                background-color: #fff; /* Match your site's header background */
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
                padding: 1rem 0;
                z-index: 1000;
            }

            .nav-links li {
                text-align: center;
                padding: 0.75rem 0;
            }

            /* class toggled via JavaScript to show the menu */
            .nav-links.active {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <header>
       <nav>
            <a href="index.html" class="logo">The Hotel</a>
            
            <!-- Mobile Hamburger Button -->
            <button class="menu-toggle" aria-label="Toggle navigation">
                &#9776;
            </button>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="rooms.html">Suites</a></li>
                <li><a href="amenities.html">Amenities & Experiences</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about.html">Our Story</a></li>
                <li><a href="booking.html">Book Now</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
        <div class="page-header">
            <h1>Your Booking Method Here</h1>
           
        </div>

        <img class="featured-img" src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1200&q=80" alt="Cinematic Description">

        <div style="max-width: 800px; margin: 0 auto;">
            
     

    </main>

    <footer>
        <p>© 2026 The Luminary Hotel. All Rights Reserved.</p>
    </footer>
     <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>

</body>
</html>
